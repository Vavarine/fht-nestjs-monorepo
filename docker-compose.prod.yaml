services:
  databasedev:
    image: postgres:17
    container_name: fiap-hack-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - pgdatadev:/var/lib/postgresql/data

  rabbitmqdev:
    image: rabbitmq:4-management
    container_name: fiap-hack-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: rabbitmq-diagnostics ping
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    image: fiap-hack-api
    container_name: fiap-hack-api
    env_file:
      - .env
    depends_on:
      databasedev:
        condition: service_started
      rabbitmqdev:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    image: fiap-hack-worker
    container_name: fiap-hack-worker
    env_file:
      - .env
    depends_on:
      databasedev:
        condition: service_started
      rabbitmqdev:
        condition: service_healthy
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - default
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: fiap-hack-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - api
      - worker
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: fiap-hack-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  pgdatadev:
  prometheusdata:
  grafanadata: