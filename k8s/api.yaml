apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fiap-hack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        # Para desenvolvimento local: use imagem local com imagePullPolicy: Never
        # Para produção/DockerHub: descomente as linhas abaixo
        # image: vavarine/fiap-hack-api:latest
        # imagePullPolicy: Always
        image: fiap-hack-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: API_PORT
          value: "3000"
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'attempt=0; until nc -z postgres 5432; do attempt=$((attempt+1)); if [ "$attempt" -ge 150 ]; then echo timeout waiting for postgres; exit 1; fi; echo waiting for postgres; sleep 2; done']
      - name: wait-for-rabbitmq
        image: busybox:1.28
        command: ['sh', '-c', 'attempt=0; until nc -z rabbitmq 5672; do attempt=$((attempt+1)); if [ "$attempt" -ge 150 ]; then echo timeout waiting for rabbitmq; exit 1; fi; echo waiting for rabbitmq; sleep 2; done']
      - name: wait-for-rustfs
        image: busybox:1.28
        command: ['sh', '-c', 'attempt=0; until wget -q --spider http://rustfs-svc:9000/health; do attempt=$((attempt+1)); if [ "$attempt" -ge 150 ]; then echo timeout waiting for rustfs health; exit 1; fi; echo waiting for rustfs health; sleep 2; done']

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: fiap-hack
spec:
  selector:
    app: api
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: fiap-hack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
