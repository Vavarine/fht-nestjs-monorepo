apiVersion: batch/v1
kind: Job
metadata:
  name: cognito-bootstrap
  namespace: fiap-hack
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: cognito-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
      - name: cognito-bootstrap
        image: amazon/aws-cli:2.17.56
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "local"
        - name: AWS_SECRET_ACCESS_KEY
          value: "local"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        command:
        - /bin/sh
        - -ec
        - |
          endpoint="http://cognito-local:9229"
          pool_name="MyUserPool"
          client_name="client-test"

          echo "Aguardando cognito-local..."
          attempts=0
          until aws --endpoint-url "$endpoint" cognito-idp list-user-pools --max-results 1 >/dev/null 2>&1; do
            attempts=$((attempts+1))
            if [ "$attempts" -ge 60 ]; then
              echo "timeout aguardando cognito-local"
              exit 1
            fi
            sleep 2
          done

          echo "Verificando user pool: $pool_name"
          pool_id=$(aws --endpoint-url "$endpoint" cognito-idp list-user-pools --max-results 60 \
            --query "UserPools[?Name=='$pool_name'].Id | [0]" --output text)

          if [ "$pool_id" = "None" ] || [ -z "$pool_id" ]; then
            echo "Criando user pool: $pool_name"
            pool_id=$(aws --endpoint-url "$endpoint" cognito-idp create-user-pool \
              --pool-name "$pool_name" \
              --query 'UserPool.Id' --output text)
            echo "User pool criado: $pool_id"
          else
            echo "User pool já existe: $pool_id"
          fi

          echo "Verificando app client: $client_name"
          client_id=$(aws --endpoint-url "$endpoint" cognito-idp list-user-pool-clients \
            --user-pool-id "$pool_id" --max-results 60 \
            --query "UserPoolClients[?ClientName=='$client_name'].ClientId | [0]" --output text)

          if [ "$client_id" = "None" ] || [ -z "$client_id" ]; then
            echo "Criando app client: $client_name"
            client_id=$(aws --endpoint-url "$endpoint" cognito-idp create-user-pool-client \
              --user-pool-id "$pool_id" \
              --client-name "$client_name" \
              --no-generate-secret \
              --explicit-auth-flows ALLOW_USER_SRP_AUTH ALLOW_REFRESH_TOKEN_AUTH \
              --query 'UserPoolClient.ClientId' --output text)
            echo "App client criado: $client_id"
          else
            echo "App client já existe: $client_id"
          fi

          echo ""
          echo "=== Cognito Local Bootstrap ==="
          echo "User Pool ID: $pool_id"
          echo "Client ID:    $client_id"
          echo "================================"
