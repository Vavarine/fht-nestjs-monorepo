apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-processor
  namespace: fiap-hack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: video-processor
  template:
    metadata:
      labels:
        app: video-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: video-processor
        # Para desenvolvimento local: use imagem local com imagePullPolicy: Never
        # Para produção/DockerHub: descomente as linhas abaixo
        # image: vavarine/fiap-hack-video-processor:latest
        # imagePullPolicy: Always
        image: fiap-hack-video-processor:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: VIDEO_PROCESSOR_PORT
          value: "3001"
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'attempt=0; until nc -z postgres 5432; do attempt=$((attempt+1)); if [ "$attempt" -ge 150 ]; then echo timeout waiting for postgres; exit 1; fi; echo waiting for postgres; sleep 2; done']
      - name: wait-for-rabbitmq
        image: busybox:1.28
        command: ['sh', '-c', 'attempt=0; until nc -z rabbitmq 5672; do attempt=$((attempt+1)); if [ "$attempt" -ge 150 ]; then echo timeout waiting for rabbitmq; exit 1; fi; echo waiting for rabbitmq; sleep 2; done']
      - name: wait-for-rustfs
        image: busybox:1.28
        command: ['sh', '-c', 'attempt=0; until wget -q --spider http://rustfs-svc:9000/health; do attempt=$((attempt+1)); if [ "$attempt" -ge 150 ]; then echo timeout waiting for rustfs health; exit 1; fi; echo waiting for rustfs health; sleep 2; done']

---
apiVersion: v1
kind: Service
metadata:
  name: video-processor
  namespace: fiap-hack
spec:
  selector:
    app: video-processor
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: video-processor-hpa
  namespace: fiap-hack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: video-processor
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
