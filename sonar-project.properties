# TODO: Update the following properties according to your project specifics.
sonar.projectKey=Vavarine_fht-nestjs-monorepo
sonar.organization=vavarine

# Project name and version
sonar.projectName=FIAP Hackathon NestJS Monorepo
sonar.projectVersion=1.0.0

# Source code directories (match Jest collectCoverageFrom)
sonar.sources=apps/api/src/application/entities,apps/api/src/application/use-cases,apps/video-processor/src/application/use-cases,apps/user-notifier/src/application/use-cases,libs/file-manager/src/application

# Test directories
sonar.tests=apps/api/src,apps/video-processor/src,apps/user-notifier/src,apps/api/test,apps/video-processor/test

# Exclude test files from source analysis
sonar.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/test/**,**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.ts,**/prisma/migrations/**,**/generated/**,**/mock*.ts,**/k8s/**,**/*.sh

# Test file patterns
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# Coverage report paths (use Jest's LCOV output directly)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Use Jest's coverage calculation (exclude only what Jest excludes)
sonar.coverage.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/test/**,**/*.config.ts,**/mock*.ts,**/prisma/migrations/**,**/generated/**

# Exclude from duplication analysis
sonar.cpd.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/test/**,**/*.config.ts,**/mock*.ts,**/prisma/migrations/**

# Quality Gate - Match Jest threshold
sonar.coverage.line=80
sonar.coverage.branch=70

# Encoding
sonar.sourceEncoding=UTF-8
